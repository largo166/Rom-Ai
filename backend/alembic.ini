# Alembic 配置文件
# 由 Phase 1 地基加固自动生成
# 数据库路径使用相对路径（相对于 backend/ 目录）

[alembic]
script_location = migrations
prepend_sys_path = .

# 使用与 app/config.py 相同的默认数据库路径
sqlalchemy.url = sqlite:///./data/rmo_ai.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
